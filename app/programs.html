<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>برامج التدريب - EgyFit Warrior Way</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
  <link rel="icon" type="image/png" href="../ic_logo.png">
  <style>
    .programs-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-lg); }
    .tabs { display: flex; gap: var(--spacing-sm); margin-bottom: var(--spacing-lg); border-bottom: 1px solid var(--border-light); padding-bottom: var(--spacing-sm); overflow-x: auto; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab-btn { background: none; border: none; color: var(--text-secondary); padding: var(--spacing-sm) var(--spacing-md); font-size: 1rem; font-weight: 600; cursor: pointer; white-space: nowrap; position: relative; }
    .tab-btn.active { color: var(--accent-gold); }
    .tab-btn.active::after { content: ''; position: absolute; bottom: -9px; left: 0; right: 0; height: 2px; background: var(--accent-gold); border-radius: 2px; }
    .programs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: var(--spacing-md); }
    .program-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: var(--spacing-md); transition: all var(--transition-fast); position: relative; overflow: hidden; }
    .program-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: var(--accent-gold); }
    .program-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: var(--spacing-sm); }
    .program-title { font-size: 1.2rem; color: var(--text-primary); font-weight: 700; margin-bottom: 5px; }
    .program-meta { font-size: 0.85rem; color: var(--text-secondary); display: flex; gap: 15px; margin-bottom: 15px; }
    .program-meta span { display: flex; align-items: center; gap: 5px; }
    .program-exercises { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 20px; line-height: 1.6; }
    .program-actions { display: flex; gap: var(--spacing-sm); }
    .btn-start { flex: 1; background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-dark)); color: #000; border: none; padding: 10px; border-radius: var(--radius-sm); font-weight: 700; cursor: pointer; transition: all var(--transition-fast); }
    .btn-start:hover { transform: scale(1.02); box-shadow: var(--shadow-gold); }
    .btn-icon { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border-light); width: 40px; height: 40px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all var(--transition-fast); }
    .btn-icon:hover { background: var(--border-light); }
    .create-card { border: 2px dashed var(--border-light); background: rgba(255,255,255,0.02); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 200px; cursor: pointer; }
    .create-card:hover { border-color: var(--accent-gold); background: rgba(255,215,0,0.05); }
    .create-card i { font-size: 2.5rem; color: var(--accent-gold); margin-bottom: 10px; }
    
    /* Modal Styles */
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; color: var(--text-secondary); font-size: 0.9rem; }
    .form-control { width: 100%; padding: 12px; background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 1rem; outline: none; }
    .form-control:focus { border-color: var(--accent-gold); }
    .routine-exercises-list { max-height: 300px; overflow-y: auto; margin-bottom: 15px; border: 1px solid var(--border-light); border-radius: var(--radius-sm); padding: 10px; }
    .routine-ex-item { display: flex; justify-content: space-between; align-items: center; background: var(--bg-secondary); padding: 10px; border-radius: var(--radius-sm); margin-bottom: 8px; border: 1px solid var(--border-light); }
    .routine-ex-item:last-child { margin-bottom: 0; }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-left">
      <button class="back-btn" onclick="navigateTo('dashboard.html')">← رجوع</button>
      <h2>📋 برامج التدريب</h2>
    </div>
  </header>

  <main class="main-content">
    <div class="programs-header">
      <p style="color: var(--text-secondary);">نظم تمارينك أو اختر من البرامج الجاهزة لتصل لأهدافك بسرعة.</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('my-routines')">برامجي الخاصة</button>
      <button class="tab-btn" onclick="switchTab('lyfta-pro')">برامج المحترفين (Lyfta Inspired)</button>
    </div>

    <!-- My Routines Tab -->
    <div id="my-routines" class="tab-content fade-in">
      <div class="programs-grid" id="myRoutinesGrid">
        <div class="program-card create-card" onclick="openCreateRoutineModal()">
          <i>+</i>
          <h3>إنشاء روتين جديد</h3>
          <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 5px;">خصص برنامجك الخاص</p>
        </div>
        <!-- Loaded routines will appear here -->
      </div>
    </div>

    <!-- Lyfta Pro Programs Tab -->
    <div id="lyfta-pro" class="tab-content hidden fade-in">
      <div class="programs-grid" id="proRoutinesGrid">
        <!-- Preset programs like PPL, StrongLifts 5x5 will appear here -->
      </div>
    </div>
  </main>

  <!-- Create Routine Modal -->
  <div class="modal" id="createRoutineModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="routineModalTitle">إنشاء روتين جديد</h3>
        <button class="close-btn" onclick="closeModal('createRoutineModal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>اسم الروتين (مثال: دفع - Push)</label>
          <input type="text" id="routineName" class="form-control" placeholder="أدخل اسم الروتين">
        </div>
        <div class="form-group">
          <label>التمارين المضافة:</label>
          <div class="routine-exercises-list" id="routineExercisesList">
            <p style="text-align:center; color:var(--text-muted); padding:20px;">لم يتم إضافة تمارين بعد</p>
          </div>
          <button class="btn-secondary" style="width:100%;" onclick="openAddExerciseToRoutine()">+ إضافة تمرين للروتين</button>
        </div>
        <button class="btn-primary" style="width:100%; margin-top: 10px;" onclick="saveRoutine()">حفظ الروتين</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-link">🏠</a>
    <a href="workout-logger.html" class="nav-link">💪</a>
    <a href="programs.html" class="nav-link active">📋</a>
    <a href="progress.html" class="nav-link">📊</a>
  </nav>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/programs.js"></script>
</body>
</html>
