<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warrior Way - أكاديمية اللياقة الذكية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-gold: #d4af37;
            --dark-bg: #0a0e27;
            --secondary-dark: #1a1f3a;
            --accent-gold: #f0d860;
            --text-light: #e8eaed;
            --text-muted: #b0b3b8;
            --warrior-red: #c41e3a;
            --success: #10b981;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', 'Tajawal', 'Cairo', sans-serif;
            background: linear-gradient(135deg, var(--dark-bg) 0%, #0f1429 100%);
            color: var(--text-light);
            overflow-x: hidden;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, var(--secondary-dark) 0%, rgba(26, 31, 58, 0.9) 100%);
            padding: 15px 20px;
            border-bottom: 2px solid var(--primary-gold);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.1);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .logo-title h1 {
            font-size: 1.6rem;
            background: linear-gradient(135deg, var(--primary-gold) 0%, var(--accent-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 900;
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary-gold) 0%, var(--accent-gold) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--dark-bg);
        }

        .user-name {
            color: var(--primary-gold);
            font-weight: bold;
        }

        .user-stats {
            display: flex;
            gap: 10px;
        }

        .stat-badge {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--primary-gold);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--primary-gold);
        }

        .login-btn, .logout-btn {
            padding: 8px 16px;
            background: var(--primary-gold);
            color: var(--dark-bg);
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .login-btn:hover, .logout-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        /* Tab Navigation */
        .tab-nav {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            background: var(--secondary-dark);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            overflow-x: auto;
            scroll-behavior: smooth;
            max-width: 1400px;
            margin: 0 auto;
        }

        .tab-btn {
            padding: 10px 20px;
            background: transparent;
            border: 2px solid rgba(212, 175, 55, 0.3);
            color: var(--text-light);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            font-weight: 600;
        }

        .tab-btn:hover {
            border-color: var(--primary-gold);
        }

        .tab-btn.active {
            background: var(--primary-gold);
            color: var(--dark-bg);
            border-color: var(--primary-gold);
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Exercises Grid */
        .body-part-nav {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 15px 0;
            scroll-behavior: smooth;
        }

        .body-part-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--secondary-dark) 0%, rgba(26, 31, 58, 0.8) 100%);
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-radius: 20px;
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            font-weight: 600;
        }

        .body-part-btn:hover, .body-part-btn.active {
            background: linear-gradient(135deg, var(--primary-gold) 0%, var(--accent-gold) 100%);
            color: var(--dark-bg);
            border-color: var(--primary-gold);
        }

        .search-section {
            margin-bottom: 20px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px;
            background: linear-gradient(135deg, var(--secondary-dark) 0%, rgba(26, 31, 58, 0.8) 100%);
            border: 2px solid var(--primary-gold);
            border-radius: 50px;
            color: var(--text-light);
            margin-bottom: 15px;
        }

        .filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
        }

        .filter-group select {
            padding: 8px 12px;
            background: var(--secondary-dark);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 6px;
            color: var(--text-light);
            cursor: pointer;
        }

        /* Exercise Card */
        .exercises-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .exercise-card {
            background: linear-gradient(135deg, var(--secondary-dark) 0%, rgba(26, 31, 58, 0.8) 100%);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .exercise-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary-gold);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.2);
        }

        .exercise-image {
            position: relative;
            height: 150px;
            background: linear-gradient(135deg, var(--primary-gold) 0%, var(--accent-gold) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            overflow: hidden;
        }

        .exercise-image::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,0,0,0.05) 10px, rgba(0,0,0,0.05) 20px);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .exercise-body {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .exercise-title {
            font-size: 1.1rem;
            font-weight: 900;
            margin-bottom: 8px;
        }

        .exercise-category {
            display: inline-block;
            background: rgba(212, 175, 55, 0.2);
            color: var(--primary-gold);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            margin-bottom: 8px;
            width: fit-content;
        }

        .exercise-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 8px 0;
            font-size: 0.8rem;
        }

        .stat {
            background: rgba(212, 175, 55, 0.05);
            padding: 6px;
            border-radius: 4px;
            border-left: 2px solid var(--primary-gold);
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.7rem;
        }

        .stat-value {
            color: var(--primary-gold);
            font-weight: bold;
        }

        .exercise-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 10px;
            border-top: 1px solid rgba(212, 175, 55, 0.1);
        }

        .fav-btn {
            background: none;
            border: 1px solid var(--primary-gold);
            color: var(--primary-gold);
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .fav-btn.liked {
            background: var(--primary-gold);
            color: var(--dark-bg);
        }

        /* Weekly Schedule */
        .schedule-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .day-card {
            background: linear-gradient(135deg, var(--secondary-dark) 0%, rgba(26, 31, 58, 0.8) 100%);
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .day-card:hover {
            border-color: var(--primary-gold);
            transform: translateY(-5px);
        }

        .day-card.completed {
            border-color: var(--success);
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(16, 185, 129, 0.05) 100%);
        }

        .day-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--primary-gold);
            margin-bottom: 8px;
        }

        .day-exercise {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .day-status {
            padding: 5px 10px;
            background: var(--primary-gold);
            color: var(--dark-bg);
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .day-status.done {
            background: var(--success);
        }

        /* Achievements */
        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .achievement-card {
            background: linear-gradient(135deg, var(--secondary-dark) 0%, rgba(26, 31, 58, 0.8) 100%);
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .achievement-card:hover {
            transform: scale(1.05);
        }

        .achievement-card.locked {
            opacity: 0.5;
            border-color: var(--text-muted);
        }

        .achievement-card.unlocked {
            border-color: var(--primary-gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .achievement-icon {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }

        .achievement-name {
            font-weight: bold;
            color: var(--primary-gold);
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .achievement-desc {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .unlock-badge {
            position: absolute;
            top: 5px;
            right: 5px;
            background: var(--success);
            color: white;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        /* Gamification Panel */
        .points-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .points-card {
            background: linear-gradient(135deg, var(--secondary-dark) 0%, rgba(26, 31, 58, 0.8) 100%);
            border: 2px solid var(--primary-gold);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }

        .points-number {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--primary-gold);
            margin-bottom: 10px;
        }

        .points-label {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .level-bar {
            margin-top: 10px;
            background: var(--dark-bg);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }

        .level-progress {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-gold) 0%, var(--accent-gold) 100%);
            transition: width 0.3s ease;
        }

        .rewards-section {
            background: linear-gradient(135deg, var(--secondary-dark) 0%, rgba(26, 31, 58, 0.8) 100%);
            border: 2px solid var(--primary-gold);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .rewards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .reward-item {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }

        .reward-icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .reward-name {
            font-weight: bold;
            color: var(--primary-gold);
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .reward-points {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* Login Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
        }

        .modal-content {
            background: var(--secondary-dark);
            margin: 10% auto;
            padding: 30px;
            border: 2px solid var(--primary-gold);
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
        }

        .modal-title {
            font-size: 1.8rem;
            color: var(--primary-gold);
            margin-bottom: 20px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            color: var(--primary-gold);
            margin-bottom: 5px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            background: var(--dark-bg);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 6px;
            color: var(--text-light);
        }

        .form-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary-gold) 0%, var(--accent-gold) 100%);
            color: var(--dark-bg);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
        }

        .close-btn {
            color: var(--primary-gold);
            float: right;
            font-size: 2rem;
            cursor: pointer;
            border: none;
            background: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
            }

            .exercises-grid {
                grid-template-columns: 1fr;
            }

            .schedule-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-content">
            <div class="logo-title">
                <h1>⚔️ Warrior Way - أكاديمية اللياقة</h1>
            </div>
            <div class="user-section">
                <div class="user-stats">
                    <div class="stat-badge">⭐ <span id="levelShow">0</span></div>
                    <div class="stat-badge">💰 <span id="pointsShow">0</span></div>
                    <div class="stat-badge">🏆 <span id="badgesShow">0</span></div>
                </div>
                <div id="userProfile" style="display: none;">
                    <div class="user-profile">
                        <div class="user-avatar" id="userAvatar">أ</div>
                        <div class="user-name" id="userName">أحمد</div>
                    </div>
                    <button class="logout-btn" onclick="logout()">تسجيل الخروج</button>
                </div>
                <button id="loginBtn" class="login-btn" onclick="showLoginModal()">دخول / تسجيل</button>
            </div>
        </div>
    </header>

    <!-- Tab Navigation -->
    <div class="tab-nav" style="justify-content: center;">
        <button class="tab-btn active" onclick="switchTab('exercises')">🏋️ التمارين</button>
        <button class="tab-btn" onclick="switchTab('schedule')">📅 جدول الأسبوع</button>
        <button class="tab-btn" onclick="switchTab('achievements')">🏅 الإنجازات</button>
        <button class="tab-btn" onclick="switchTab('gamification')">🎮 نظام المكافآت</button>
    </div>

    <!-- Container -->
    <div class="container">
        <!-- Exercises Tab -->
        <div id="exercises" class="tab-content active">
            <div class="search-section">
                <div class="body-part-nav" id="bodyPartNav"></div>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="🔍 ابحث عن تمرين...">
                </div>
                <div class="filters">
                    <select id="difficultyFilter">
                        <option value="">الكل - الصعوبة</option>
                        <option value="مبتدئ">مبتدئ</option>
                        <option value="متوسط">متوسط</option>
                        <option value="متقدم">متقدم</option>
                    </select>
                    <select id="equipmentFilter">
                        <option value="">الكل - المعدات</option>
                        <option value="بدون معدات">بدون معدات</option>
                        <option value="دمبل">دمبل</option>
                        <option value="بار">بار</option>
                        <option value="ماشين">ماشين</option>
                    </select>
                </div>
            </div>
            <div class="exercises-grid" id="exercisesGrid"></div>
        </div>

        <!-- Schedule Tab -->
        <div id="schedule" class="tab-content">
            <h2 style="margin-bottom: 20px; color: var(--primary-gold);">📅 جدول تدريبك الأسبوعي</h2>
            <div class="schedule-grid" id="scheduleGrid"></div>
        </div>

        <!-- Achievements Tab -->
        <div id="achievements" class="tab-content">
            <h2 style="margin-bottom: 20px; color: var(--primary-gold);">🏅 إنجازاتك</h2>
            <div class="achievements-grid" id="achievementsGrid"></div>
        </div>

        <!-- Gamification Tab -->
        <div id="gamification" class="tab-content">
            <h2 style="margin-bottom: 20px; color: var(--primary-gold);">🎮 نظام المكافآت والنقاط</h2>
            <div class="points-section" id="pointsSection"></div>
            <div class="rewards-section">
                <h3 style="color: var(--primary-gold);">🎁 المكافآت المتاحة</h3>
                <div class="rewards-grid" id="rewardsGrid"></div>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeLoginModal()">&times;</button>
            <h2 class="modal-title">دخول / تسجيل</h2>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>الاسم</label>
                    <input type="text" id="userName" placeholder="أدخل اسمك" required>
                </div>
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="userEmail" placeholder="بريدك الإلكتروني" required>
                </div>
                <button type="submit" class="form-btn">دخول الآن 🚀</button>
            </form>
        </div>
    </div>

    <script>
        // Data
        const exercises = [
            { id: 1, name: "البنش برس", emoji: "🏋️", category: "صدر", difficulty: "مبتدئ", equipment: "بار", sets: 4, reps: "8-10" },
            { id: 2, name: "القرفصاء", emoji: "🦵", category: "أرجل", difficulty: "متوسط", equipment: "بار", sets: 4, reps: "8-10" },
            { id: 3, name: "الجذب للأسفل", emoji: "🎯", category: "ظهر", difficulty: "مبتدئ", equipment: "ماشين", sets: 3, reps: "10-12" },
            { id: 4, name: "الضغط العسكري", emoji: "🪖", category: "كتفين", difficulty: "متوسط", equipment: "بار", sets: 4, reps: "8-10" },
            { id: 5, name: "البايسبس", emoji: "💪", category: "ذراعين", difficulty: "مبتدئ", equipment: "دمبل", sets: 3, reps: "10-12" },
            { id: 6, name: "الكرانشز", emoji: "😤", category: "بطن", difficulty: "مبتدئ", equipment: "بدون معدات", sets: 3, reps: "15-20" },
            { id: 7, name: "اليقطة المائلة", emoji: "💪", category: "صدر", difficulty: "متوسط", equipment: "دمبل", sets: 3, reps: "10-12" },
            { id: 8, name: "صفوف الدمبل", emoji: "🏋️", category: "ظهر", difficulty: "متوسط", equipment: "دمبل", sets: 4, reps: "8-10" },
        ];

        const achievements = [
            { id: 1, icon: "🌟", name: "البداية", desc: "أكمل أول تمرين", points: 10 },
            { id: 2, icon: "🔥", name: "محارب النار", desc: "أكمل 10 تمارين", points: 50 },
            { id: 3, icon: "💪", name: "قوة الحديد", desc: "أكمل 50 تمرين", points: 200 },
            { id: 4, icon: "🏆", name: "البطل", desc: "أكمل 100 تمرين", points: 500 },
            { id: 5, icon: "⭐", name: "الأسبوع الذهبي", desc: "اكمل كل أيام الأسبوع", points: 100 },
            { id: 6, icon: "🚀", name: "يوم مثالي", desc: "اكمل 3 جلسات في يوم", points: 75 },
        ];

        const schedule = [
            { day: "السبت", emoji: "💪", exercises: "صدر و ظهر" },
            { day: "الأحد", emoji: "🦵", exercises: "أرجل" },
            { day: "الاثنين", emoji: "🪖", exercises: "كتفين" },
            { day: "الثلاثاء", emoji: "💪", exercises: "ذراعين" },
            { day: "الأربعاء", emoji: "😤", exercises: "بطن" },
            { day: "الخميس", emoji: "🔥", exercises: "حرق سعرات" },
            { day: "الجمعة", emoji: "😴", exercises: "راحة" },
        ];

        const rewards = [
            { icon: "🎯", name: "نقاط إضافية", points: "10 نقاط" },
            { icon: "🎖️", name: "شارة نادرة", points: "50 نقطة" },
            { icon: "💎", name: "عضوية ذهبية", points: "200 نقطة" },
            { icon: "🏅", name: "تدريب خاص", points: "100 نقطة" },
        ];

        let user = JSON.parse(localStorage.getItem('user'));
        let userData = JSON.parse(localStorage.getItem('userData')) || {
            level: 1,
            points: 0,
            achievementsUnlocked: [],
            completedExercises: 0
        };

        function init() {
            initBodyPartTabs();
            displayExercises(exercises);
            displaySchedule();
            displayAchievements();
            displayGamification();
            updateHeader();
        }

        function updateHeader() {
            if (user) {
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('userProfile').style.display = 'flex';
                document.getElementById('userName').textContent = user.name;
                document.getElementById('userAvatar').textContent = user.name[0];
            } else {
                document.getElementById('loginBtn').style.display = 'block';
                document.getElementById('userProfile').style.display = 'none';
            }
            
            document.getElementById('levelShow').textContent = userData.level;
            document.getElementById('pointsShow').textContent = userData.points;
            document.getElementById('badgesShow').textContent = userData.achievementsUnlocked.length;
        }

        function initBodyPartTabs() {
            const bodyParts = ['صدر', 'ظهر', 'أرجل', 'كتفين', 'ذراعين', 'بطن'];
            const nav = document.getElementById('bodyPartNav');
            nav.innerHTML = '<button class="body-part-btn active" onclick="filterByBodyPart(\'الكل\')">🏋️ الكل</button>';
            
            bodyParts.forEach(part => {
                const emojis = { 'صدر': '🏋️', 'ظهر': '🎯', 'أرجل': '🦵', 'كتفين': '🪖', 'ذراعين': '💪', 'بطن': '😤' };
                const btn = document.createElement('button');
                btn.className = 'body-part-btn';
                btn.textContent = `${emojis[part]} ${part}`;
                btn.onclick = () => filterByBodyPart(part);
                nav.appendChild(btn);
            });
        }

        let currentBodyPart = 'الكل';

        function filterByBodyPart(part) {
            currentBodyPart = part;
            document.querySelectorAll('.body-part-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            filterExercises();
        }

        function filterExercises() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const difficulty = document.getElementById('difficultyFilter').value;
            const equipment = document.getElementById('equipmentFilter').value;

            const filtered = exercises.filter(ex => {
                const matchBodyPart = currentBodyPart === 'الكل' || ex.category === currentBodyPart;
                const matchSearch = ex.name.includes(search);
                const matchDifficulty = !difficulty || ex.difficulty === difficulty;
                const matchEquipment = !equipment || ex.equipment === equipment;
                
                return matchBodyPart && matchSearch && matchDifficulty && matchEquipment;
            });

            displayExercises(filtered);
        }

        function displayExercises(list) {
            const grid = document.getElementById('exercisesGrid');
            grid.innerHTML = list.map(ex => `
                <div class="exercise-card">
                    <div class="exercise-image">${ex.emoji}</div>
                    <div class="exercise-body">
                        <div class="exercise-title">${ex.name}</div>
                        <div class="exercise-category">${ex.category}</div>
                        <div class="exercise-stats">
                            <div class="stat"><div class="stat-label">المجموعات</div><div class="stat-value">${ex.sets}</div></div>
                            <div class="stat"><div class="stat-label">التكرارات</div><div class="stat-value">${ex.reps}</div></div>
                        </div>
                        <div class="exercise-footer">
                            <small style="color: var(--text-muted);">${ex.equipment}</small>
                            <button class="fav-btn" onclick="completeExercise(event, ${ex.id})">✅ إكمال</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function completeExercise(e, id) {
            if (!user) {
                showLoginModal();
                return;
            }
            userData.points += 10;
            userData.completedExercises += 1;
            if (userData.completedExercises % 10 === 0) userData.level += 1;
            localStorage.setItem('userData', JSON.stringify(userData));
            updateHeader();
            checkAchievements();
            e.target.disabled = true;
            e.target.textContent = '✓ تم';
        }

        function displaySchedule() {
            const grid = document.getElementById('scheduleGrid');
            grid.innerHTML = schedule.map((day, idx) => `
                <div class="day-card ${idx === new Date().getDay() ? 'completed' : ''}">
                    <div class="day-name">${day.emoji}</div>
                    <div style="font-weight: bold; margin-bottom: 8px;">${day.day}</div>
                    <div class="day-exercise">${day.exercises}</div>
                    <div class="day-status ${idx === new Date().getDay() ? 'done' : ''}">
                        ${idx === new Date().getDay() ? '✅ اليوم' : '📅 قادم'}
                    </div>
                </div>
            `).join('');
        }

        function displayAchievements() {
            const grid = document.getElementById('achievementsGrid');
            grid.innerHTML = achievements.map(ach => {
                const unlocked = userData.achievementsUnlocked.includes(ach.id);
                return `
                    <div class="achievement-card ${unlocked ? 'unlocked' : 'locked'}">
                        ${unlocked ? '<div class="unlock-badge">✓</div>' : ''}
                        <div class="achievement-icon">${ach.icon}</div>
                        <div class="achievement-name">${ach.name}</div>
                        <div class="achievement-desc">${ach.desc}</div>
                    </div>
                `;
            }).join('');
        }

        function displayGamification() {
            const pointsSection = document.getElementById('pointsSection');
            const progress = (userData.points % 100);
            
            pointsSection.innerHTML = `
                <div class="points-card">
                    <div class="points-number">${userData.level}</div>
                    <div class="points-label">المستوى الحالي</div>
                </div>
                <div class="points-card">
                    <div class="points-number">${userData.points}</div>
                    <div class="points-label">إجمالي النقاط</div>
                    <div class="level-bar">
                        <div class="level-progress" style="width: ${progress}%"></div>
                    </div>
                </div>
                <div class="points-card">
                    <div class="points-number">${userData.completedExercises}</div>
                    <div class="points-label">التمارين المكتملة</div>
                </div>
            `;

            const rewardsGrid = document.getElementById('rewardsGrid');
            rewardsGrid.innerHTML = rewards.map(r => `
                <div class="reward-item">
                    <div class="reward-icon">${r.icon}</div>
                    <div class="reward-name">${r.name}</div>
                    <div class="reward-points">${r.points}</div>
                </div>
            `).join('');
        }

        function checkAchievements() {
            if (userData.completedExercises === 1 && !userData.achievementsUnlocked.includes(1)) {
                userData.achievementsUnlocked.push(1);
            }
            if (userData.completedExercises === 10 && !userData.achievementsUnlocked.includes(2)) {
                userData.achievementsUnlocked.push(2);
            }
            if (userData.completedExercises === 50 && !userData.achievementsUnlocked.includes(3)) {
                userData.achievementsUnlocked.push(3);
            }
            localStorage.setItem('userData', JSON.stringify(userData));
            displayAchievements();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        function showLoginModal() {
            document.getElementById('loginModal').style.display = 'block';
        }

        function closeLoginModal() {
            document.getElementById('loginModal').style.display = 'none';
        }

        function handleLogin(e) {
            e.preventDefault();
            const name = document.getElementById('userName').value;
            const email = document.getElementById('userEmail').value;
            
            user = { name, email };
            localStorage.setItem('user', JSON.stringify(user));
            closeLoginModal();
            updateHeader();
            location.reload();
        }

        function logout() {
            localStorage.removeItem('user');
            user = null;
            updateHeader();
            location.reload();
        }

        document.getElementById('searchInput')?.addEventListener('input', filterExercises);
        document.getElementById('difficultyFilter')?.addEventListener('change', filterExercises);
        document.getElementById('equipmentFilter')?.addEventListener('change', filterExercises);

        window.onclick = (e) => {
            if (e.target.id === 'loginModal') closeLoginModal();
        };

        init();
    </script>
</body>
</html>
